services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # For NVIDIA GPU, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

  s-trans:
    build: .
    image: s-trans:latest
    ports:
      - "7860:7860"
    environment:
      HOST: 0.0.0.0
      PORT: 7860
      LOG_LEVEL: INFO
      MAX_UPLOAD_MB: "50"
      CONCURRENT_CHUNKS: "1"
    volumes:
      - s-trans-tmp:/tmp/s-trans
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  s-trans-tmp:
  ollama-data:
